name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/tananotes_ci
      NEXT_PUBLIC_BASE_URL: http://127.0.0.1:3000
      JWT_SECRET: ci_jwt_secret_change_me

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Start app
        run: |
          nohup npm run start -- -p 3000 > app.log 2>&1 &

      - name: Wait for app to be ready
        run: |
          for i in {1..30}; do
            if curl -sS -o /dev/null http://127.0.0.1:3000/login; then
              echo "App is ready"
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time"
          cat app.log || true
          exit 1

      - name: Auth smoke test
        env:
          BASE_URL: http://127.0.0.1:3000
        run: npm run test:auth-smoke

      - name: Notes smoke test
        env:
          BASE_URL: http://127.0.0.1:3000
        run: npm run test:notes-smoke

      - name: Upload app logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-log
          path: app.log
